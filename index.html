<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><meta name="color-scheme" content="dark"><meta name="apple-mobile-web-app-capable" content="yes"><title>Weight Training App</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><main id="app"><section id="tab-content-today" class="tab-content active"><h2>今日の記録</h2><div class="form-group"><label>日付</label><input type="date" id="record-date"></div><div class="form-group"><label>カテゴリ</label><div id="record-category-buttons"></div><input type="hidden" id="record-selected-category"></div><div class="form-group"><label>種目</label><select id="record-exercise-dropdown"><option value="">種目を選択</option></select></div><div id="record-sets-container"><div class="set-row"><input type="number" id="record-set-1-weight" placeholder="kg" style="width:110px"> x <input type="number" id="record-set-1-reps" placeholder="回" style="width:100px"> <button onclick="WTRecord._saveSet(1)">Set1 完了</button></div><div class="set-row"><input type="number" id="record-set-2-weight" placeholder="kg" style="width:110px"> x <input type="number" id="record-set-2-reps" placeholder="回" style="width:100px"> <button onclick="WTRecord._saveSet(2)">Set2 完了</button></div><div class="set-row"><input type="number" id="record-set-3-weight" placeholder="kg" style="width:110px"> x <input type="number" id="record-set-3-reps" placeholder="回" style="width:100px"> <button onclick="WTRecord._saveSet(3)">Set3 完了</button></div><div class="set-row"><input type="number" id="record-set-4-weight" placeholder="kg" style="width:110px"> x <input type="number" id="record-set-4-reps" placeholder="回" style="width:100px"> <button onclick="WTRecord._saveSet(4)">Set4 完了</button></div></div></section><section id="tab-content-analysis" class="tab-content"><div id="analysis-exercise-select"></div><canvas id="analysis-chart"></canvas><h2>分析</h2><canvas id="exerciseChart"></canvas><canvas id="progressChart"></canvas></section><section id="tab-content-ai" class="tab-content"><h2>AIコーチ</h2><div id="ai-timer-display" class="ai-timer">5:00</div><div id="ai-exercise-list" style="margin-bottom:16px"></div><div id="ai-comment" style="font-size:22px;margin-top:16px">AIコメントがここに表示されます</div></section><section id="tab-content-history" class="tab-content"><h2>履歴</h2><div id="history-container"></div><div id="history-ai-comment" style="margin-top:16px;font-size:16px;"></div></section><section id="tab-content-settings" class="tab-content"><h2>設定</h2><h3>カテゴリ</h3><div id="categoriesList"></div><h3>種目</h3><div id="exercisesList"></div><div class="form-group"><label>分析期間</label><input type="number" id="analysisMonths" min="1" max="12" value="6"></div></section></main><nav class="tab-bar"><button class="tab-bar__tab active" data-tab="today"><span class="tab-bar__label">今日の記録</span></button><button class="tab-bar__tab" data-tab="analysis"><span class="tab-bar__label">分析</span></button><button class="tab-bar__tab" data-tab="ai"><span class="tab-bar__label">AI</span></button><button class="tab-bar__tab" data-tab="history"><span class="tab-bar__label">履歴</span></button><button class="tab-bar__tab" data-tab="settings"><span class="tab-bar__label">設定</span></button></nav><script src="core.js"></script><script src="tabs.js"></script><script src="record.js"></script><script src="history.js"></script><script src="analysis.js"></script><script src="ai.js"></script><script src="settings.js"></script><script src="app.js"></script></body></html>
